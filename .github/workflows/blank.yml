name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    container: ubuntu:18.04          # Python 2 原生支持，twrpdtgen 旧版可直接安装
    
    steps:
    - name: Check Out
      uses: actions/checkout@v2      # 使用 v2 避免 glibc 2.28 依赖问题
      
    - name: Prepare the environment
      run: |
        apt update
        apt -y install python python-pip cpio wget aria2 git zip
        pip2 install twrpdtgen==1.1.0
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        ls
      
    - name: Start build
      run: |
        python2 -m twrpdtgen -o dt/ *.img
        
    - name: ZIP device tree
      run: |
        zip -r DeviceTree.zip ./dt
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: DeviceTree for twrp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
