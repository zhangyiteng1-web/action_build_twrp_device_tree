name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest          # 只负责提供容器环境
    container: ubuntu:20.04         # 使用 Docker 里的 Ubuntu 20.04，自带 Python 2

    steps:
    - name: Check Out
      uses: actions/checkout@main
      
    - name: Prepare the environment
      run: |
        apt update
        # 容器内默认 root，无需 sudo；安装 python2.7、pip2 和相关工具
        apt -y install python2.7 curl cpio wget aria2
        # 手动安装 pip2（因为 apt 里的 python-pip 已不可用）
        curl -sS https://bootstrap.pypa.io/pip/2.7/get-pip.py -o get-pip.py
        python2.7 get-pip.py
        # 用 pip2 安装 twrpdtgen
        pip2 install twrpdtgen
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        ls
      
    - name: Start build
      run: |
        # 使用 python2.7 运行（保持和原脚本一样的调用方式，只是指定了 python 版本）
        python2.7 -m twrpdtgen -o dt/ *.img
        
    - name: ZIP device tree
      run: |
        apt -y install zip
        zip -r DeviceTree.zip ./dt
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: DeviceTree for twrp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
