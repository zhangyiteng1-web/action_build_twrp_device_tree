name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL (recovery.img 或带 recovery 的 boot.img)'
        required: true
        default: ''
      BUILD_PROP_URL:
        description: '可选：build.prop 直链（如果镜像缺少必要属性）'
        required: false
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04

    steps:
    - name: Check Out
      uses: actions/checkout@main

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget aria2 abootimg
        pip3 install twrpdtgen
        mkdir dt

    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        echo "DOWNLOADED_FILE=$(ls *.img 2>/dev/null | head -n1)" >> $GITHUB_ENV
        ls -l

    - name: Inject external build.prop if provided
      if: github.event.inputs.BUILD_PROP_URL != ''
      run: |
        IMG="${{ env.DOWNLOADED_FILE }}"
        if [ -z "$IMG" ]; then
          echo "❌ 未找到 .img 文件。"
          exit 1
        fi
        echo "🔄 正在下载外部 build.prop：${{ github.event.inputs.BUILD_PROP_URL }}"
        wget -O build.prop "${{ github.event.inputs.BUILD_PROP_URL }}"
        if [ ! -s build.prop ]; then
          echo "❌ 下载的 build.prop 为空或失败。"
          exit 1
        fi
        echo "📦 正在解包镜像（abootimg）..."
        abootimg -x "$IMG"
        # abootimg 生成的是 initrd.img（不是 initramfs.img）
        RAMDISK_FILE="initrd.img"
        if [ ! -f "$RAMDISK_FILE" ]; then
          echo "❌ 解包失败：未提取到 $RAMDISK_FILE。"
          exit 1
        fi
        # 检查内核文件，可能是 zImage 或 kernel
        KERNEL_FILE=""
        if [ -f "zImage" ]; then
          KERNEL_FILE="zImage"
        elif [ -f "kernel" ]; then
          KERNEL_FILE="kernel"
        else
          echo "❌ 未找到内核文件 (zImage 或 kernel)。"
          exit 1
        fi
        echo "✅ 找到内核文件：$KERNEL_FILE"
        
        mkdir ramdisk
        cd ramdisk
        # 解压 ramdisk（通常是 gzip 压缩的 cpio 归档）
        gunzip -c ../"$RAMDISK_FILE" | cpio -idmv 2>/dev/null || true
        # 将 build.prop 复制到根目录和 system/ 下（twrpdtgen 会搜索这些位置）
        cp ../build.prop .
        mkdir -p system
        cp ../build.prop system/
        echo "✅ build.prop 已注入到 ramdisk。"
        # 重新打包 ramdisk
        find . | cpio -o -H newc | gzip > ../new-initrd.img
        cd ..
        # 重新打包完整镜像（使用正确的内核文件名）
        abootimg --create new.img -f bootimg.cfg -k "$KERNEL_FILE" -r new-initrd.img
        if [ ! -f new.img ]; then
          echo "❌ 重新打包镜像失败。"
          exit 1
        fi
        # 用新镜像替换原文件
        echo "DOWNLOADED_FILE=new.img" >> $GITHUB_ENV
        echo "✅ 新镜像已生成：new.img，将用于生成设备树。"

    - name: Start build
      run: |
        if [ -z "${{ env.DOWNLOADED_FILE }}" ]; then
          echo "❌ 没有可用的镜像文件。"
          exit 1
        fi
        echo "▶️ 正在使用镜像：${{ env.DOWNLOADED_FILE }} 生成设备树..."
        python3 -m twrpdtgen -o dt/ "${{ env.DOWNLOADED_FILE }}"

    - name: ZIP device tree
      run: |
        zip -r DeviceTree.zip ./dt

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: DeviceTree for twrp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
