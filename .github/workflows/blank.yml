name: Make TWRP Device

on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    container: ubuntu:20.04   # 使用原生 Python 2 环境
    
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Prepare the environment (Python 2)
      run: |
        # 容器默认 root，无需 sudo
        apt update
        DEBIAN_FRONTEND=noninteractive apt -y install \
          python2 python python2-pip python-pip cpio wget aria2 curl git
        
        # 使用 Python 2 的 pip 安装 twrpdtgen（此时旧版可用）
        pip2 install twrpdtgen
        
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        aria2c "${{ github.event.inputs.IMG_URL }}"
        ls
      
    - name: Start build (force Python 2)
      run: |
        img_file=$(ls *.img | head -1)
        # 明确调用 python2 运行
        python2 -m twrpdtgen -o dt/ "$img_file"
        
    - name: ZIP device tree
      run: |
        apt -y install zip
        zip -r DeviceTree.zip ./dt
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: DeviceTree for twrp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
